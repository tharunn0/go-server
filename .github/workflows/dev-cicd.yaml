name: Dev Release-Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dev-cicd
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint, and Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Check Formatting (gofmt)
        run: test -z "$(gofmt -s -l .)"

      - name: Go Vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Run Tests
        run: go test -v  ./...

  build-image:
    name: Build and Push Image
    runs-on: ubuntu-24.04
    needs: ci

    permissions:
      contents: read
      packages: write

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/go-server:dev-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/go-server:dev-latest

  deploy:
    name: Deploy image to staging server
    needs: build-image
    uses: ./.github/workflows/deploy-ssh.yaml
    with:
      username: ubuntu
      container_name: go-server
      image_tag: dev-latest
      host: ${{ vars.STAGING_SERVER_IP }}
    secrets:
      ssh_key: ${{ secrets.STAGING_SSH_KEY }}
      ghcr_pat: ${{ secrets.GHCR_PAT }}
